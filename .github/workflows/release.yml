name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-python:
    name: Build Python Source and Wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: dist/

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext python3-all build-essential debhelper dh-python
      - name: Install stdeb
        run: |
          python3 -m pip install --upgrade pip
          pip install stdeb
      - name: Build DB
        run: |
          python3 setup.py --command-packages=stdeb.command bdist_deb
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: deb-package
          path: deb_dist/*.deb

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Build Dependencies
        run: |
          dnf install -y python3-devel python3-setuptools python3-pip rpm-build gettext git
      - name: Build RPM
        run: |
          # Create RPM build structure
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          
          # Generate source tarball and copy to SOURCES
          python3 setup.py sdist
          cp dist/*.tar.gz ~/rpmbuild/SOURCES/
          
          # Generate SPEC file
          python3 setup.py bdist_rpm --spec-only
          # The spec file is usually in dist/ or build/bdist.../rpm/SPECS/
          # but we can find it and copy it to SPECS
          find build -name "*.spec" -exec cp {} ~/rpmbuild/SPECS/ \;
          
          # Build RPM
          rpmbuild -ba ~/rpmbuild/SPECS/*.spec
          
          # Move result to dist/ for uploading
          cp ~/rpmbuild/RPMS/noarch/*.rpm dist/
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rpm-package
          path: dist/*.noarch.rpm

  create-release:
    name: Create GitHub Release
    needs: [build-python, build-deb, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
