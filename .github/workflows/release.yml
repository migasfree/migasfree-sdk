name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-python:
    name: Build Python Source and Wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-dist
          path: dist/

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext python3-all build-essential debhelper dh-python python3-distro
      - name: Install stdeb
        run: |
          python3 -m pip install --upgrade pip
          pip install stdeb
      - name: Build DB
        run: |
          ./bin/create-package
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: deb-package
          path: deb_dist/*.deb

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Build Dependencies
        run: |
          dnf install -y python3-devel python3-setuptools python3-pip rpm-build gettext git python3-distro
      - name: Build RPM
        run: |
          ./bin/create-package
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rpm-package
          path: dist/*.noarch.rpm

  create-release:
    name: Create GitHub Release
    needs: [build-python, build-deb, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
